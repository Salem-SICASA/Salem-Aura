<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Journal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}
header{
    background:#4a6cf7;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}
.container{
    padding:15px;
}
.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
h3{
    margin-top:0;
}
button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:5px;
}
.primary{ background:#4a6cf7; color:white;}
.danger{ background:#ff4d4d; color:white;}
.success{ background:#28a745; color:white;}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}
input, select{
    padding:5px;
    width:100%;
}
.dark-mode{
    background:#1e1e1e;
    color:white;
}
.dark-mode .card{
    background:#2e2e2e;
}
.badge{
    padding:5px 10px;
    background:gold;
    border-radius:8px;
    display:inline-block;
    margin-top:5px;
}
.blast{
    font-size:22px;
    text-align:center;
}
</style>
</head>

<body>

<header>
Study Journal  
<button onclick="toggleDark()">🌙</button>
</header>

<div class="container">

<!-- DASHBOARD -->
<div class="card">
<h3>📅 Today</h3>
<p id="todayDate"></p>
</div>

<!-- EXAM TRACKER -->
<div class="card">
<h3>Exam Tracker</h3>
<button class="primary" onclick="addExamRow()">Add Row</button>
<table id="examTable">
<tr>
<th>Subject</th>
<th>Exam Date</th>
<th>Portion</th>
<th>Prep %</th>
<th>Countdown</th>
<th>Delete</th>
</tr>
</table>
</div>

<!-- TODO LIST -->
<div class="card">
<h3>Smart To-Do</h3>
<input id="taskInput" placeholder="Task name">
<select id="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>
<button class="primary" onclick="addTask()">Add Task</button>
<ul id="taskList"></ul>
<div class="blast" id="blast"></div>
</div>

<!-- REVISION SYSTEM -->
<div class="card">
<h3>Spaced Revision Planner</h3>
<input id="revSubject" placeholder="Subject">
<input type="date" id="firstDate">
<button class="primary" onclick="generateRevision()">Generate</button>
<table id="revisionTable">
<tr>
<th>Subject</th>
<th>Revision Date</th>
</tr>
</table>
</div>

<!-- FOCUS TIMER -->
<div class="card">
<h3>Focus Timer</h3>
<input type="number" id="minutes" placeholder="Minutes">
<button class="success" onclick="startTimer()">Start</button>
<p id="timerDisplay"></p>
</div>

<!-- ANALYTICS -->
<div class="card">
<h3>Weekly Study Hours</h3>
<canvas id="barChart"></canvas>
</div>

<div class="card">
<h3>Time Distribution</h3>
<canvas id="pieChart"></canvas>
</div>

<!-- GAMIFICATION -->
<div class="card">
<h3>Performance</h3>
<p>XP: <span id="xp">0</span></p>
<p>Streak: <span id="streak">0</span> days</p>
<div id="badge"></div>
</div>

</div>

<script>

// TODAY DATE
document.getElementById("todayDate").innerText = new Date().toDateString();

// DARK MODE
function toggleDark(){
    document.body.classList.toggle("dark-mode");
}

// EXAM TRACKER
function addExamRow(){
    let table = document.getElementById("examTable");
    let row = table.insertRow();
    row.innerHTML = `
    <td><input></td>
    <td><input type="date" onchange="updateCountdown(this)"></td>
    <td><input></td>
    <td><input type="range" min="0" max="100"></td>
    <td class="countdown"></td>
    <td><button class="danger" onclick="this.parentElement.parentElement.remove()">X</button></td>
    `;
}

function updateCountdown(input){
    let date = new Date(input.value);
    let today = new Date();
    let diff = Math.ceil((date - today)/(1000*60*60*24));
    input.parentElement.nextElementSibling.nextElementSibling.nextElementSibling.innerText = diff+" days";
}

// TODO
let xp = 0;
let streak = 0;

function addTask(){
    let task = document.getElementById("taskInput").value;
    let priority = document.getElementById("priority").value;
    let li = document.createElement("li");
    li.innerHTML = `${task} - ${priority} <button onclick="completeTask(this)">✔</button>`;
    document.getElementById("taskList").appendChild(li);
}

function completeTask(btn){
    btn.parentElement.remove();
    xp += 10;
    streak += 1;
    document.getElementById("xp").innerText = xp;
    document.getElementById("streak").innerText = streak;
    document.getElementById("blast").innerText="🎊🎉 Task Completed!";
    setTimeout(()=>{document.getElementById("blast").innerText="";},2000);
    updateBadge();
}

function updateBadge(){
    let badge = document.getElementById("badge");
    if(xp>=100){ badge.innerHTML="<div class='badge'>Exam Warrior</div>"; }
    else if(xp>=50){ badge.innerHTML="<div class='badge'>Master Planner</div>"; }
    else if(xp>=20){ badge.innerHTML="<div class='badge'>Consistent Learner</div>"; }
    else{ badge.innerHTML="<div class='badge'>Beginner</div>"; }
}

// REVISION SYSTEM
function generateRevision(){
    let subject = document.getElementById("revSubject").value;
    let first = new Date(document.getElementById("firstDate").value);
    let days = [1,3,7,15];
    days.forEach(d=>{
        let newDate = new Date(first);
        newDate.setDate(first.getDate()+d);
        let row = document.getElementById("revisionTable").insertRow();
        row.innerHTML=`<td>${subject}</td><td>${newDate.toDateString()}</td>`;
    });
}

// TIMER
function startTimer(){
    let min = document.getElementById("minutes").value;
    let time = min*60;
    let display = document.getElementById("timerDisplay");
    let interval = setInterval(()=>{
        let m = Math.floor(time/60);
        let s = time%60;
        display.innerText = m+":"+s;
        time--;
        if(time<0){
            clearInterval(interval);
            alert("Session Complete");
        }
    },1000);
}

// CHARTS
new Chart(document.getElementById("barChart"),{
type:'bar',
data:{
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
datasets:[{
label:'Hours',
data:[2,3,1,4,2,5,3]
}]
}
});

new Chart(document.getElementById("pieChart"),{
type:'pie',
data:{
labels:['Maths','Physics','Chemistry'],
datasets:[{
data:[40,30,30]
}]
}
});

</script>
</body>
</html>
