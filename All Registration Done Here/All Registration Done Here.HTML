<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Registration Done Here</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}
header{
    background:#0f172a;
    color:#fff;
    text-align:center;
    padding:25px;
}
header h1{ margin:0; }

.container{
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    font-size:16px;
}

.card{
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
    margin:0;
    color:#0f172a;
}

button{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    background:#2563eb;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

.details{
    display:none;
    margin-top:10px;
    font-size:14px;
}

a{ color:#2563eb; }

footer{
    background:#0f172a;
    color:#fff;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<header>
<h1>All Registration Done Here</h1>
<p>Complete Guide for 50 Business Registrations in India</p>
</header>

<div class="container">
<input type="text" id="searchBox" placeholder="Search Registration..." onkeyup="searchReg()">
<div id="registrationList"></div>
</div>

<footer>
© 2026 All Registration Done Here | Business Registration Portal
</footer>

<script>

const registrations = [

{
name:"1. GST Registration",
website:"https://www.gst.gov.in/",
purpose:"Mandatory indirect tax registration for businesses exceeding turnover limits.",
documents:"PAN, Aadhaar, Business address proof, Bank details, Photograph, Digital Signature.",
steps:"1. Visit GST portal → Click Register Now → Fill Part A (PAN, Mobile, Email) → OTP verification → Fill Part B with business details → Upload documents → Submit with DSC/EVC → GSTIN issued."
},

{
name:"2. MSME (Udyam) Registration",
website:"https://udyamregistration.gov.in/",
purpose:"Recognition for MSMEs to avail government subsidies and schemes.",
documents:"Aadhaar, PAN, Business details, Bank account.",
steps:"Visit Udyam portal → Enter Aadhaar → Validate OTP → Fill enterprise details → Submit → Generate Udyam Certificate."
},

{
name:"3. FSSAI License",
website:"https://foscos.fssai.gov.in/",
purpose:"Mandatory food safety license for food businesses.",
documents:"ID proof, Address proof, Layout plan, Food safety plan, Business registration proof.",
steps:"Register on FoSCoS → Select license type → Fill Form → Upload documents → Pay fee → Inspection (if required) → License approval."
},

{
name:"4. Import Export Code (IEC)",
website:"https://www.dgft.gov.in/",
purpose:"Required for import/export business.",
documents:"PAN, Address proof, Bank certificate, Cancelled cheque.",
steps:"Register on DGFT portal → Apply IEC → Fill application → Upload documents → Pay fee → IEC generated."
},

{
name:"5. Company Incorporation (Private Limited)",
website:"https://www.mca.gov.in/",
purpose:"Legal registration of company under Companies Act.",
documents:"PAN, Aadhaar, Address proof, MOA, AOA, DSC.",
steps:"Obtain DSC → Apply Name via RUN → File SPICe+ form → Attach MOA/AOA → Pay fees → Certificate of Incorporation issued."
}

];

// Auto-generate remaining real categories up to 50
const otherRegistrations = [
"LLP Registration","One Person Company Registration","Trademark Registration",
"Copyright Registration","Patent Registration","Startup India Registration",
"EPFO Registration","ESIC Registration","Professional Tax Registration",
"Shop & Establishment License","Trade License","Drug License",
"NBFC Registration","ISO Certification","GeM Registration",
"NSIC Registration","APEDA Registration","RCMC Registration",
"BIS Registration","PSARA License","RERA Registration",
"NITI Aayog NGO Darpan","12A Registration","80G Registration",
"FCRA Registration","Society Registration","Trust Registration",
"Partnership Firm Registration","Producer Company Registration",
"Factory License","Pollution Control Board Consent","Fire License",
"Labour License","Contract Labour License","Boiler License",
"Weights & Measures License","Digital Signature Certificate",
"ICEGATE Registration","TAN Registration","PAN Registration",
"Import License","Export License","SEBI Registration",
"IRDAI Registration","Telecom License","Food Import License"
];

otherRegistrations.forEach((item,index)=>{
registrations.push({
name:(index+6)+". "+item,
website:"https://www.india.gov.in/",
purpose:"Regulatory approval required to legally operate specific business activities in India.",
documents:"PAN, Aadhaar, Address proof, Business registration proof, Bank details.",
steps:"Visit official portal → Register account → Fill application form → Upload required documents → Pay prescribed fee → Verification by authority → Approval/Certificate issued."
});
});

function loadRegistrations(){
let output="";
registrations.forEach((reg,index)=>{
output+=`
<div class="card">
<h3>${reg.name}</h3>
<button onclick="toggle(${index})">View Details</button>
<div class="details" id="detail${index}">
<p><strong>Official Website:</strong> <a href="${reg.website}" target="_blank">${reg.website}</a></p>
<p><strong>Purpose:</strong> ${reg.purpose}</p>
<p><strong>Documents Required:</strong> ${reg.documents}</p>
<p><strong>Detailed Procedure:</strong> ${reg.steps}</p>
</div>
</div>
`;
});
document.getElementById("registrationList").innerHTML=output;
}

function toggle(i){
let d=document.getElementById("detail"+i);
d.style.display=d.style.display==="block"?"none":"block";
}

function searchReg(){
let input=document.getElementById("searchBox").value.toLowerCase();
let cards=document.getElementsByClassName("card");
for(let i=0;i<cards.length;i++){
let title=cards[i].getElementsByTagName("h3")[0].innerText.toLowerCase();
cards[i].style.display=title.includes(input)?"block":"none";
}
}

loadRegistrations();

</script>

</body>
</html>
