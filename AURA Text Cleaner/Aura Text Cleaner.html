<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SALEM AURA - Text Cleaner</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:0;
}

.container{
    width:80%;
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:150px;
    padding:10px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
    resize:vertical;
}

label{
    font-weight:bold;
}

.buttons{
    margin-top:15px;
}

button{
    padding:10px 18px;
    margin-right:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:14px;
}

.clean{
    background:#2e7d32;
    color:white;
}

.reset{
    background:#c62828;
    color:white;
}

.copy{
    background:#1565c0;
    color:white;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<h1>SALEM AURA - Text Cleaner</h1>

<label>Input the text or sentence here</label>
<textarea id="inputText" placeholder="Paste or type your text here..."></textarea>

<div class="buttons">
<button class="clean" onclick="cleanText()">Process</button>
<button class="reset" onclick="resetText()">Reset</button>
<button class="copy" onclick="copyText()">Copy</button>
</div>

<br><br>

<label>Output</label>
<textarea id="outputText" readonly></textarea>

</div>

<script>

function cleanText(){

let text = document.getElementById("inputText").value;

/* Remove tabs and line breaks */
text = text.replace(/[\t\n\r]/g,' ');

/* Remove special characters except letters numbers spaces and . */
text = text.replace(/[^a-zA-Z0-9. ]/g,'');

/* Remove multiple spaces */
text = text.replace(/\s+/g,' ');

/* Trim */
text = text.trim();

document.getElementById("outputText").value = text;

}

function resetText(){
document.getElementById("inputText").value="";
document.getElementById("outputText").value="";
}

function copyText(){
let output = document.getElementById("outputText");
output.select();
output.setSelectionRange(0,99999);
document.execCommand("copy");
alert("Text copied!");
}

</script>

</body>
</html>
